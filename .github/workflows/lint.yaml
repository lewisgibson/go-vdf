name: Lint

on:
    workflow_dispatch: {}

    push:
        branches:
            - main

    pull_request:
        branches:
            - main

permissions:
    contents: read
    pull-requests: read

jobs:
    go:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6.0.2

            - name: Setup Go
              uses: actions/setup-go@v6.4.0
              with:
                  go-version-file: ./go.mod

            - name: Lint
              uses: golangci/golangci-lint-action@v9.2.0
              with:
                  version: v2.3.0

    actionlint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6.0.2

            - name: Actionlint
              uses: raven-actions/actionlint@v2.1.2

    prettier:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6.0.2

            - name: Setup Node
              uses: actions/setup-node@v6.4.0

            - name: Prettier
              run: npx --yes prettier@3.5.3 --check '**/*.md' '**/*.yaml' '**/*.yml' '**/*.json'
